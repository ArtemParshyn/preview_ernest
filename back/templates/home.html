<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paminklų Konstruktorius</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }
        
        .header {
            background: #00A0E3;
            color: white;
            text-align: center;
            padding: 30px 20px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .input-container {
            position: relative;
        }
        
        .input-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        
        input[type="text"]:focus {
            border-color: #00A0E3;
            box-shadow: 0 0 0 3px rgba(0, 160, 227, 0.2);
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #00A0E3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn:hover {
            background: #0085C7;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .info {
            margin-top: 25px;
            padding: 15px;
            background: #f5f9ff;
            border-radius: 10px;
            border-left: 4px solid #00A0E3;
        }
        
        .info p {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
            border-top: 1px solid #eee;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Paminklų Konstruktorius</h1>
            <p>Sukurkite savo unikalų paminklą</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label for="username">Įveskite savo vartotojo vardą:</label>
                <div class="input-container">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Jūsų vartotojo vardas" autocomplete="off" autofocus>
                </div>
            </div>
            
            <button class="btn" id="continueBtn">
                <i class="fas fa-arrow-right mr-2"></i>Pradėti kurti
            </button>
            
            <div class="info">
                <p><i class="fas fa-info-circle mr-2"></i> Įveskite unikalų vardą ir paspauskite "Enter" arba "Pradėti kurti", kad pereitumėte į paminklų kūrimo puslapį.</p>
            </div>
        </div>

    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            const continueBtn = document.getElementById('continueBtn');
            
            // Обработчик нажатия Enter в поле ввода
            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    redirectToConstructor();
                }
            });
            
            // Обработчик клика по кнопке
            continueBtn.addEventListener('click', redirectToConstructor);
            
            function redirectToConstructor() {
                let username = usernameInput.value.trim();
                
                // Базовая валидация
                if (!username) {
                    alert('Prašome įvesti vartotojo vardą');
                    return;
                }
                
                // Очищаем от нежелательных символов
                username = username.replace(/[^a-zA-Z0-9а-яА-Я_-]/g, '');
                
                // Перенаправляем на страницу конструктора
                window.location.href = `/${username}`;
            }
        });
    </script>
</body>
</html>
