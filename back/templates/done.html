        :root {
            --primary: #00A0E3;
            --primary-dark: #0085C7;
            --primary-light: #E6F5FC;
            --secondary: #FFC107;
            --dark: #333333;
            --gray: #666666;
            --light-gray: #F5F5F5;
            --white: #FFFFFF;
            --success: #4CAF50;
            --error: #F44336;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 6px 16px rgba(0, 0, 0, 0.12);
            --border-radius: 12px;
        }

        /* Стили для галереи портфолио */
        .portfolio-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem 1rem;
            text-align: center;
            margin-bottom: 2rem;
            color: white;
            box-shadow: var(--shadow);
            position: relative;
        }

        .portfolio-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .portfolio-header p {
            font-size: 1.25rem;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0.9;
        }

        .portfolio-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .portfolio-filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            background-color: var(--light-gray);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .portfolio-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        .portfolio-item {
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            background: white;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .portfolio-img-container {
            position: relative;
            overflow: hidden;
            padding-top: 75%; /* Соотношение сторон 4:3 */
        }

        .portfolio-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-item:hover .portfolio-img {
            transform: scale(1.05);
        }

        .portfolio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-item:hover .portfolio-overlay {
            opacity: 1;
        }

        .portfolio-overlay i {
            color: white;
            font-size: 2rem;
        }

        .portfolio-info {
            padding: 1.5rem;
        }

        .portfolio-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .portfolio-description {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .portfolio-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .portfolio-tag {
            background-color: var(--primary-light);
            color: var(--primary-dark);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Модальное окно для изображений */
        .portfolio-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3000;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .portfolio-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .portfolio-modal-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .portfolio-modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .portfolio-modal-close:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        .portfolio-modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
        }

        .portfolio-modal-prev, .portfolio-modal-next {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .portfolio-modal-prev:hover, .portfolio-modal-next:hover {
            background: var(--primary);
        }

        .portfolio-modal-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        .portfolio-modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .portfolio-modal-description {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Стили для кнопки "Atgal" */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .portfolio-gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .portfolio-header h1 {
                font-size: 2rem;
            }

            .portfolio-header p {
                font-size: 1rem;
            }

            .portfolio-filters {
                flex-direction: column;
                align-items: center;
            }

            .filter-btn {
                width: 100%;
                max-width: 300px;
            }
            
            .back-button {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .portfolio-gallery {
                grid-template-columns: 1fr;
            }
        }
        
        /* Скрытие описания */
        .portfolio-modal-description {
            display: none;
        }
    </style>
</head>

<body style="overflow-y: auto;">
    <!-- Шапка страницы с кнопкой "Atgal" -->
    <header class="portfolio-header">
        <!-- Кнопка "Atgal" -->
        <button class="back-button" id="backButton">
            <i class="fas fa-arrow-left"></i>
        </button>
        
        <div class="container mx-auto">
            <h1>Mūsų Atlikti Darbai</h1>
        </div>
    </header>

    <!-- Галерея работ -->
    <div class="portfolio-container">
        <div class="portfolio-gallery">
            {% for item in items %}
            <div class="portfolio-item">
                <div class="portfolio-img-container">
                    <img src="{{ item.image_url }}" alt="{{ item.name }}" class="portfolio-img">
                    <div class="portfolio-overlay">
                        <i class="fas fa-search-plus"></i>
                    </div>
                </div>
                <div class="portfolio-info">
                    <h3 class="portfolio-title">{{ item.name }}</h3>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Модальное окно для просмотра изображений -->
    <div class="portfolio-modal" id="portfolioModal">
        <div class="portfolio-modal-content">
            <span class="portfolio-modal-close" id="closeModal">&times;</span>
            <img src="" alt="" class="portfolio-modal-img" id="modalImage">
            <div class="portfolio-modal-nav">
                <button class="portfolio-modal-prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                <button class="portfolio-modal-next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="portfolio-modal-info">
                <h3 class="portfolio-modal-title" id="modalTitle"></h3>
                <p class="portfolio-modal-description" id="modalDescription"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Обработчик для кнопки "Atgal"
            document.getElementById('backButton').addEventListener('click', function() {
                window.history.back();
            });

            // Открытие модального окна
            const modal = document.getElementById('portfolioModal');
            const modalImg = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const closeModal = document.getElementById('closeModal');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            let currentItemIndex = 0;
            const portfolioItems = document.querySelectorAll('.portfolio-item');
            const portfolioItemsArray = [];

            // Собираем данные из элементов
            portfolioItems.forEach((item, index) => {
                const img = item.querySelector('.portfolio-img');
                const title = item.querySelector('.portfolio-title').textContent;
                
                portfolioItemsArray.push({
                    image: img.src,
                    title: title
                });

                item.addEventListener('click', function() {
                    currentItemIndex = index;
                    openModal();
                });
            });

            function openModal() {
                if (portfolioItemsArray.length === 0) return;
                
                const currentItem = portfolioItemsArray[currentItemIndex];
                modalImg.src = currentItem.image;
                modalTitle.textContent = currentItem.title;
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                
                // Обновляем видимость кнопок навигации
                prevBtn.style.display = currentItemIndex > 0 ? 'flex' : 'none';
                nextBtn.style.display = currentItemIndex < portfolioItemsArray.length - 1 ? 'flex' : 'none';
            }

            function closeModalFunc() {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }

            closeModal.addEventListener('click', closeModalFunc);

            // Навигация по модальному окну
            prevBtn.addEventListener('click', function() {
                if (currentItemIndex > 0) {
                    currentItemIndex--;
                    openModal();
                }
            });

            nextBtn.addEventListener('click', function() {
                if (currentItemIndex < portfolioItemsArray.length - 1) {
                    currentItemIndex++;
                    openModal();
                }
            });

            // Закрытие по клику вне изображения
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModalFunc();
                }
            });

            // Закрытие по клавише ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModalFunc();
                }
            });
        });
    </script>
</body>
